<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .app {
        display: flex;
        height: 100vh;
      }
      .sidebar {
        width: 260px;
        background-color: lightskyblue;
      }
      .doc_item {
        padding: 20px 10px 20px 80px;
        border: 1px solid black;
      }
      .chat {
        flex: 1;
        background-color: lightyellow;
      }
      .doc_item:hover {
        background-color: aquamarine;
      }
      .chat {
        display: flex;
        flex-direction: column;
      }
      .messages {
        flex: 1;
        background-color: aliceblue;
      }
      .bubble {
        padding: 30px 30px 30px 30px;
        border-radius: 10px;
        margin-bottom: 10px;
        max-width: 40%;
      }
      .bubble.user {
        background-color: blueviolet;
        color: white;
        margin-left: auto;
      }
      .bubble.ai {
        background-color: lightcoral;
        color: white;
      }
      .input_row {
        display: flex;
        padding: 10px;
        align-items: center;
        gap: 10px;
      }
      .input {
        flex: 1;
        padding: 10px;
      }
      .button {
        padding: 10px 20px;
      }
      .button:hover {
        background-color: lightcoral;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="sidebar">
        <h1>My Documents</h1>
        <div class="doc_item">Chemistry</div>
        <div class="doc_item">Physics</div>
        <div class="doc_item">Math</div>
      </div>

      <div class="chat">
        <div class="messages">
          <p class="bubble user"></p>
          <p class="bubble ai"></p>
        </div>
        <div class="input_text">
          <input class="input" type="text" placeholder="Ask a question" />
          <button class="button">Send</button>
        </div>
      </div>
    </div>
  </body>
</html>
